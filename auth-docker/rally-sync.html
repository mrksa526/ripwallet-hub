<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>771 Rally Coordinator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #06b6d4;
            --accent-alt: #8b5cf6;
            --bg-dark: #0f172a;
            --bg-mid: #1e293b;
            --bg-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2a4a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            animation: slideDown 0.8s ease-out;
        }

        .header-title {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .config-item {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .config-label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 9px 10px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .btn {
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            background: var(--bg-mid);
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        .btn:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            transform: translateY(-1px);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            transform: scale(1.15);
        }

        .target-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease-out 0.15s both;
        }

        .btn-target {
            padding: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg-mid);
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
            font-size: 0.85rem;
        }

        .btn-target:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-target.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .groups-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .group {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .group-name {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.95rem;
            flex: 1;
            min-width: 120px;
        }

        .group-name input {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }

        .group-actions {
            display: flex;
            gap: 8px;
        }

        .member {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 0.8fr 0.8fr auto;
            gap: 8px;
            align-items: flex-end;
            font-size: 0.85rem;
        }

        .member input {
            font-size: 0.85rem;
            padding: 6px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            -webkit-user-select: text;
            user-select: text;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .member-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .member-delete {
            background: var(--accent);
            color: white;
            border: 1.5px solid var(--accent);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.7rem;
            transition: all 0.15s ease;
        }

        .member-delete:hover {
            background: #0891b2;
            border-color: #0891b2;
        }

        .add-btn {
            background: var(--accent-alt);
            color: white;
            border: 1.5px solid var(--accent-alt);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.15s ease;
            width: 100%;
            margin-top: 6px;
        }

        .add-btn:hover {
            background: #a78bfa;
            border-color: #a78bfa;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent-alt));
            color: white;
            border: none;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .results {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--success);
            padding: 14px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .results.show {
            display: block;
        }

        .result-group {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .result-group-title {
            font-weight: 700;
            color: var(--success);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .result-line {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(75, 85, 99, 0.3);
            font-size: 0.85rem;
            align-items: center;
        }

        .result-line:last-child {
            border-bottom: none;
        }

        .result-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .result-time {
            color: var(--accent-alt);
            font-weight: 700;
            font-size: 1.1rem;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        .copy-group-btn {
            background: var(--accent);
            color: white;
            border: 1.5px solid var(--accent);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            transition: all 0.15s ease;
            width: 100%;
            margin-top: 8px;
        }

        .copy-group-btn:hover {
            background: #0891b2;
            border-color: #0891b2;
        }

        .copy-group-btn.copied {
            background: var(--success);
            border-color: var(--success);
        }

        .impact-time {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            text-align: center;
        }

        .impact-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .impact-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--success);
            font-variant-numeric: tabular-nums;
        }

        .utc-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 12px;
        }

        @media (max-width: 640px) {
            body {
                -webkit-overflow-scrolling: touch;
            }

            .config-grid {
                grid-template-columns: 1fr;
            }

            .member {
                grid-template-columns: 1fr 1fr auto;
                gap: 6px;
            }

            .member > div:nth-child(3),
            .member > div:nth-child(4) {
                display: none;
            }

            .member-label {
                grid-column: 1;
                grid-row: span 2;
            }

            .config-item {
                padding: 10px;
            }

            .header-title {
                font-size: 1.4rem;
            }

            /* Prevent input zoom on iOS */
            input[type="text"],
            input[type="number"],
            input[type="checkbox"],
            select,
            textarea {
                font-size: 16px;
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
            }

            /* Improve tap responsiveness */
            button,
            input[type="button"],
            input[type="submit"] {
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }

            /* Smooth scrolling */
            * {
                -webkit-tap-highlight-color: rgba(139, 92, 246, 0.2);
            }
        }

        .session-panel {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideDown 0.3s ease-out;
            will-change: opacity, transform;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .session-panel.show {
            display: block;
        }

        .session-item {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: flex-end;
        }

        .session-item:last-child {
            margin-bottom: 0;
        }

        .session-item:first-child {
            grid-template-columns: 1fr auto auto;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: var(--bg-dark);
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
            will-change: opacity, transform;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            pointer-events: none;
        }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
                will-change: opacity, transform;
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
                will-change: opacity, transform;
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
                will-change: opacity, transform;
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-groups {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="header-title">771 Rally Coordinator</h1>
            <p class="header-subtitle">RALLY SYNCHRONIZATION <span id="liveIndicator" style="display: none; color: #10b981; margin-left: 8px; font-size: 0.8em;">● LIVE</span></p>
        </header>

        <div class="target-buttons">
            <button class="btn-target active" onclick="setTarget('castle')">🏰 Castle</button>
            <button class="btn-target" onclick="setTarget('turret')">🏯 Turret</button>
            <button class="btn-target" onclick="setTarget('city')">🏙️ City</button>
        </div>

        <div id="configSection">
            <div class="config-grid">
            <div class="config-item">
                <label class="config-label" title="How long the rally takes to start marching after the rally begins">Rally Time</label>
                <select id="rallyTime" onchange="updateConfigs()" title="How long the rally takes to start marching after the rally begins. Players will march for this duration before hitting the target.">
                    <option value="1">1 Minute</option>
                    <option value="5" selected>5 Minutes</option>
                    <option value="10">10 Minutes</option>
                    <option value="15">15 Minutes</option>
                </select>
            </div>
            <div class="config-item">
                <label class="config-label" title="How long to wait before the rally starts (heads up time)">Start Delay</label>
                <select id="startDelay" onchange="updateConfigs()" style="display: block; margin-bottom: 8px;" title="How long to wait before the rally starts. This is the heads up time before players launch their marches.">
                    <option value="1">1 Minute</option>
                    <option value="2" selected>2 Minutes</option>
                    <option value="3">3 Minutes</option>
                    <option value="5">5 Minutes</option>
                </select>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="checkbox" id="customStartDelayCheck" onchange="toggleCustomStartDelay()" style="width: 18px; height: 18px; cursor: pointer;" title="Enable custom start delay value">
                    <label for="customStartDelayCheck" style="margin: 0; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;" title="Check to enter a custom start delay value">Custom Value</label>
                </div>
                <input type="number" id="customStartDelayInput" min="30" max="3600" placeholder="Enter seconds (min 30)" onchange="updateConfigs()" style="display: none; width: 100%; margin-top: 8px;" title="Enter custom start delay in seconds (minimum 30 seconds)">
            </div>
        </div>
        </div>

        <div class="utc-time" id="utcTime"></div>

        <button class="btn" onclick="toggleSession()" style="width: 100%; margin-bottom: 16px;">⚙️ Session</button>
        <div class="session-panel" id="sessionPanel">
            <!-- Dynamically rendered by renderSessionPanel() -->
        </div>

        <div class="groups-container" id="groupsContainer"></div>

        <button class="btn" onclick="addGroup()" style="width: 100%; margin-bottom: 16px;">+ Add Group</button>

        <button class="btn-primary" onclick="calculateRallies()">⚡ Calculate</button>

        <div class="results" id="results"></div>
        
        <div id="comparisonSection" style="display: none;"></div>
        
        <div id="comparisonInput" style="margin-top: 20px; padding: 16px; background: rgba(168, 85, 247, 0.05); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 8px;">
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px;">
                <input type="checkbox" id="showComparisonToggle" onchange="state.showComparison = this.checked; renderComparisonView();" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="showComparisonToggle" style="margin: 0; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; flex: 1;">View other alliance rallies</label>
            </div>
            <div id="comparisonInputFields" style="display: none;">
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="comparisonSessionId" placeholder="Paste alliance session ID" style="flex: 1;">
                    <button class="btn" onclick="startComparisonSession(document.getElementById('comparisonSessionId').value)" style="background-color: #a855f7; white-space: nowrap;">+ Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            target: 'castle',
            rallyTime: 5,
            startDelay: 2,
            groups: [],
            configs: {},
            sessionId: null,
            isReadOnly: false,
            copyData: {},
            calculatedRallyStartTime: null,
            transferToken: null,
            transferPending: false,
            comparisonSessions: [],  // Array of {sessionId, allianceName, data, pollingInterval}
            showComparison: false
        };

        const STORAGE_PREFIX = 'rally_sync_';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateUTC();
            setInterval(updateUTC, 1000);
            addGroup();
            renderSessionPanel();
            
            // Auto-restore session if user was joined before page refresh
            const lastSessionId = localStorage.getItem('LAST_SESSION_ID');
            const wasReadOnly = localStorage.getItem('IS_READ_ONLY') === 'true';
            
            if (lastSessionId) {
                state.sessionId = lastSessionId;
                state.isReadOnly = wasReadOnly;
                
                // Show toast that we're restoring
                const mode = wasReadOnly ? '(View Only)' : '(Edit)';
                showToast(`Restoring session: ${lastSessionId} ${mode}...`);
                
                // Load the session automatically
                loadSession();
            }
            
            // Setup comparison toggle
            const compToggle = document.getElementById('showComparisonToggle');
            if (compToggle) {
                compToggle.addEventListener('change', function() {
                    document.getElementById('comparisonInputFields').style.display = this.checked ? 'block' : 'none';
                });
            }
        });

        function updateUTC() {
            const now = new Date();
            const h = String(now.getUTCHours()).padStart(2, '0');
            const m = String(now.getUTCMinutes()).padStart(2, '0');
            const s = String(now.getUTCSeconds()).padStart(2, '0');
            document.getElementById('utcTime').textContent = `UTC: ${h}:${m}:${s}`;
        }

        function setTarget(target) {
            state.target = target;
            document.querySelectorAll('.btn-target').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateConfigs();
        }

        function toggleCustomStartDelay() {
            const checkbox = document.getElementById('customStartDelayCheck');
            const selectInput = document.getElementById('startDelay');
            const customInput = document.getElementById('customStartDelayInput');
            
            if (checkbox.checked) {
                selectInput.style.display = 'none';
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                selectInput.style.display = 'block';
                customInput.style.display = 'none';
            }
            updateConfigs();
        }

        function updateConfigs() {
            if (state.isReadOnly) return;
            state.rallyTime = parseInt(document.getElementById('rallyTime').value);
            
            const customCheckbox = document.getElementById('customStartDelayCheck');
            if (customCheckbox.checked) {
                let customSeconds = parseInt(document.getElementById('customStartDelayInput').value) || 30;
                // PREVENT LESS THAN 30 SECONDS
                if (customSeconds < 30) customSeconds = 30;
                // Store as SECONDS
                state.startDelay = customSeconds;
            } else {
                let delayMinutes = parseInt(document.getElementById('startDelay').value);
                // PREVENT NEGATIVE START DELAY
                if (delayMinutes < 0) delayMinutes = 0;
                // Convert minutes to seconds
                state.startDelay = delayMinutes * 60;
            }
            
            // Clear the calculated time so next Calculate will use fresh current time
            state.calculatedRallyStartTime = null;
            autoSave();
        }

        function addGroup() {
            if (state.isReadOnly) {
                showToast('Read-only: Cannot add groups');
                return;
            }
            state.groups.push({
                id: `g_${Date.now()}`,
                name: `Group ${state.groups.length + 1}`,
                members: [],
                groupOffsetMin: 0,
                groupOffsetSec: 0
            });
            renderGroups();
            autoSave();
        }

        function deleteGroup(id) {
            if (state.isReadOnly) {
                showToast('Read-only: Cannot delete groups');
                return;
            }
            state.groups = state.groups.filter(g => g.id !== id);
            renderGroups();
            autoSave();
        }

        function addMember(groupId) {
            if (state.isReadOnly) {
                showToast('Read-only: Cannot add members');
                return;
            }
            const g = state.groups.find(g => g.id === groupId);
            if (g && g.members.length < 8) {
                g.members.push({ id: `m_${Date.now()}`, name: '', march: 30, offsetMin: 0, offsetSec: 0 });
                renderGroups();
                autoSave();
            }
        }

        function deleteMember(groupId, memberId) {
            if (state.isReadOnly) {
                showToast('Read-only: Cannot delete members');
                return;
            }
            const g = state.groups.find(g => g.id === groupId);
            if (g) {
                g.members = g.members.filter(m => m.id !== memberId);
                renderGroups();
                autoSave();
            }
        }

        function updateMember(groupId, memberId, field, value) {
            if (state.isReadOnly) return;
            const g = state.groups.find(g => g.id === groupId);
            if (g) {
                const m = g.members.find(m => m.id === memberId);
                if (m) {
                    if (field === 'name') {
                        m[field] = value;
                    } else if (field === 'offsetSec') {
                        // Auto-convert seconds >= 60 to minutes
                        let totalSeconds = parseInt(value) || 0;
                        // PREVENT NEGATIVE VALUES
                        if (totalSeconds < 0) totalSeconds = 0;
                        
                        const additionalMinutes = Math.floor(totalSeconds / 60);
                        const remainingSeconds = totalSeconds % 60;
                        
                        m.offsetMin = (m.offsetMin || 0) + additionalMinutes;
                        m.offsetSec = remainingSeconds;
                    } else if (field === 'offsetMin' || field === 'march') {
                        // PREVENT NEGATIVE VALUES
                        let val = parseInt(value) || 0;
                        if (val < 0) val = 0;
                        m[field] = val;
                    } else {
                        m[field] = parseInt(value) || 0;
                    }
                    autoSave();
                    // Re-render to show converted values
                    renderGroups();
                }
            }
        }

        function updateGroupName(groupId, name) {
            if (state.isReadOnly) return;
            const g = state.groups.find(g => g.id === groupId);
            if (g) {
                g.name = name || `Group ${state.groups.indexOf(g) + 1}`;
                autoSave();
            }
        }

        function updateGroupOffset(groupId, type, value) {
            if (state.isReadOnly) return;
            const g = state.groups.find(g => g.id === groupId);
            if (g) {
                let val = parseInt(value) || 0;
                // PREVENT NEGATIVE VALUES
                if (val < 0) val = 0;
                
                if (type === 'min') {
                    g.groupOffsetMin = val;
                } else if (type === 'sec') {
                    // Auto-convert seconds >= 60 to minutes
                    const totalSeconds = val;
                    const additionalMinutes = Math.floor(totalSeconds / 60);
                    const remainingSeconds = totalSeconds % 60;
                    
                    g.groupOffsetMin = (g.groupOffsetMin || 0) + additionalMinutes;
                    g.groupOffsetSec = remainingSeconds;
                }
                autoSave();
                // Re-render to show converted values
                renderGroups();
            }
        }


        function startComparisonSession(sessionId) {
            if (!sessionId.trim()) {
                showToast('Enter session ID');
                return;
            }
            
            // Check if already added
            if (state.comparisonSessions.some(s => s.sessionId === sessionId)) {
                showToast('Session already added');
                return;
            }
            
            // Add to comparison sessions
            const compSession = {
                sessionId: sessionId,
                allianceName: sessionId,  // Use session ID as label
                data: null,
                pollingInterval: null
            };
            
            state.comparisonSessions.push(compSession);
            
            // Start polling this session
            pollComparisonSession(compSession);
            
            // Clear input
            document.getElementById('comparisonSessionId').value = '';
            
            showToast(`Added session: ${sessionId}`);
            renderComparisonView();
        }
        
        function pollComparisonSession(compSession) {
            // Load initial data
            loadComparisonData(compSession);
            
            // Poll every 2 seconds
            compSession.pollingInterval = setInterval(() => {
                loadComparisonData(compSession);
            }, 2000);
        }
        
        async function loadComparisonData(compSession) {
            try {
                const response = await fetch(`/api/session/${compSession.sessionId}`);
                if (response.ok) {
                    const result = await response.json();
                    compSession.data = result.data;
                }
            } catch (e) {
                console.warn(`Could not load comparison session ${compSession.sessionId}:`, e);
            }
            
            if (!compSession.data) {
                const localData = localStorage.getItem(STORAGE_PREFIX + compSession.sessionId);
                if (localData) {
                    compSession.data = JSON.parse(localData);
                }
            }
            
            renderComparisonView();
        }
        
        function removeComparisonSession(sessionId) {
            const idx = state.comparisonSessions.findIndex(s => s.sessionId === sessionId);
            if (idx !== -1) {
                clearInterval(state.comparisonSessions[idx].pollingInterval);
                state.comparisonSessions.splice(idx, 1);
                showToast('Removed from comparison');
                renderComparisonView();
            }
        }

        function calculateRallies() {
            // Don't update configs if in read-only mode (joiner)
            if (!state.isReadOnly) {
                updateConfigs();
            }
            const now = new Date();

            const results = document.getElementById('results');
            let html = `
                <div style="text-align: center; margin-bottom: 12px; padding: 10px; background: rgba(139, 92, 246, 0.1); border-radius: 6px; border: 1px solid rgba(139, 92, 246, 0.2);">
                    <div style="font-size: 0.85em; color: #999;">Target: ${state.target.charAt(0).toUpperCase() + state.target.slice(1)} | Rally Time: ${state.rallyTime}m</div>
                </div>
            `;

            state.groups.forEach(g => {
                const members = g.members.filter(m => m.name.trim());
                if (!members.length) return;

                // Use global Start Delay for all groups
                const rallyStartTime = new Date(now.getTime() + state.startDelay * 1000);
                
                // Store calculated time for this group (for joiner accuracy)
                if (!state.calculatedRallyStartTime) {
                    state.calculatedRallyStartTime = rallyStartTime.toISOString();
                    if (!state.isReadOnly) {
                        autoSave();
                    }
                }

                // Rally start section
                html += `
                    <div style="text-align: center; margin-bottom: 20px; padding: 16px; background: rgba(6, 182, 212, 0.1); border-radius: 8px;">
                        <div class="impact-label">🎯 ${g.name} - RALLY STARTS AT</div>
                        <div style="font-size: 2em; color: #06b6d4; font-weight: bold; margin: 8px 0;">
                            ${pad(rallyStartTime.getUTCHours())}:${pad(rallyStartTime.getUTCMinutes())}:${pad(rallyStartTime.getUTCSeconds())}
                        </div>
                        <div style="text-align: center; font-size: 0.85em; color: #999; margin-top: 8px;">After ${state.startDelay} seconds heads up</div>
                        <div style="text-align: center; font-size: 0.9em; color: #6366f1; margin-top: 12px;">⬇ When each player launches their march ⬇</div>
                    </div>
                `;

                // Calculate group offset in seconds
                const groupOffsetSeconds = (g.groupOffsetMin || 0) * 60 + (g.groupOffsetSec || 0);

                // Find the longest march time in this group
                const longestMarch = Math.max(...members.map(m => m.march || 0));

                const calcs = members.map(m => {
                    // Calculate member offset in seconds (min * 60 + sec)
                    const memberOffsetSeconds = (m.offsetMin || 0) * 60 + (m.offsetSec || 0);
                    // Total offset = member offset + group offset
                    const totalOffsetSeconds = memberOffsetSeconds + groupOffsetSeconds;
                    
                    // Spacing = difference between longest march and this player's march
                    // Players with longer marches launch earlier (smaller spacing)
                    // Players with shorter marches launch later (larger spacing)
                    const spacing = longestMarch - (m.march || 0);
                    
                    // Launch time = Rally start + spacing + offset
                    // NO march time subtraction - march time just determines spacing order
                    const launchTime = new Date(rallyStartTime.getTime() + spacing * 1000 + totalOffsetSeconds * 1000);
                    
                    return {
                        name: m.name,
                        march: m.march,
                        offsetMin: m.offsetMin || 0,
                        offsetSec: m.offsetSec || 0,
                        launchTime: `${pad(launchTime.getUTCHours())}:${pad(launchTime.getUTCMinutes())}:${pad(launchTime.getUTCSeconds())}`
                    };
                });

                // Sort by launch time
                calcs.sort((a, b) => {
                    const timeA = a.launchTime.split(':').map(Number);
                    const timeB = b.launchTime.split(':').map(Number);
                    const secsA = timeA[0] * 3600 + timeA[1] * 60 + timeA[2];
                    const secsB = timeB[0] * 3600 + timeB[1] * 60 + timeB[2];
                    return secsA - secsB;
                });

                // Copy text: Only names and launch times
                const copyText = calcs.map(c => `${c.name}: ${c.launchTime}`).join('\n');

                html += `
                    <div class="result-group">
                        <div class="result-group-title">${g.name}</div>
                        ${calcs.map(c => `
                            <div class="result-line">
                                <div class="result-name">${c.name}</div>
                                <div class="result-time" title="March: ${c.march}s">${c.launchTime}</div>
                            </div>
                        `).join('')}
                        <button class="copy-group-btn" onclick="copyGroup(this, '${g.id}')">📋 Copy All</button>
                    </div>
                `;
                state.copyData[g.id] = copyText;
            });

            results.innerHTML = html;
            results.classList.add('show');
        }

        function exportJSON() {
            const exportData = {
                version: 1,
                target: state.target,
                rallyTime: state.rallyTime,
                startDelay: state.startDelay,
                groups: state.groups,
                exportedAt: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `rally-${state.target}-${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('✓ Exported JSON!');
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        
                        // Validate imported data
                        if (!importedData.groups || !Array.isArray(importedData.groups)) {
                            showToast('❌ Invalid file format');
                            return;
                        }
                        
                        // Load imported data
                        state.target = importedData.target || 'castle';
                        state.rallyTime = importedData.rallyTime || 5;
                        state.startDelay = importedData.startDelay || 1;
                        state.groups = importedData.groups;
                        
                        // Update UI
                        document.getElementById('rallyTime').value = state.rallyTime;
                        document.getElementById('startDelay').value = state.startDelay;
                        document.querySelectorAll('.btn-target').forEach(b => b.classList.remove('active'));
                        document.querySelector(`button[onclick="setTarget('${state.target}')"]`).classList.add('active');
                        
                        renderGroups();
                        autoSave();
                        showToast('✓ Imported JSON!');
                    } catch (error) {
                        showToast('❌ Error importing file');
                        console.error('Import error:', error);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function generateSession() {
            // Generate friendly session ID: numbers and common symbols only
            // Format: XXXX-XXXX (8 digits separated by dash for easy reading)
            const chars = '0123456789';
            let id = '';
            for (let i = 0; i < 8; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            // Add dash in the middle for readability
            id = id.substring(0, 4) + '-' + id.substring(4);
            
            state.sessionId = id;
            state.isReadOnly = false;
            
            // Save generated session as editable
            localStorage.setItem('LAST_SESSION_ID', id);
            localStorage.setItem('IS_READ_ONLY', 'false');
            
            document.getElementById('sessionId').value = id;
            autoSave();
            showToast(`Session: ${id} (Edit)`);
        }

        function clearSession() {
            // Clear the persisted session - user can rejoin with ID if needed
            localStorage.removeItem('LAST_SESSION_ID');
            localStorage.removeItem('IS_READ_ONLY');
            state.isReadOnly = false;
            state.sessionId = null;
            
            // Clean up comparison sessions
            state.comparisonSessions.forEach(comp => {
                if (comp.pollingInterval) clearInterval(comp.pollingInterval);
            });
            state.comparisonSessions = [];
            
            // Hide results if in read-only mode
            const resultsSection = document.getElementById('resultsSection');
            if (resultsSection) resultsSection.innerHTML = '';
            
            // Show edit controls
            document.getElementById('configSection').style.display = 'block';
            document.getElementById('groupsContainer').style.display = 'block';
            const addGroupBtn = document.querySelector('button[onclick="addGroup()"]');
            if (addGroupBtn) addGroupBtn.style.display = 'block';
            
            showToast('Session cleared');
            location.reload();
        }

        function initiateTransfer() {
            if (state.isReadOnly) {
                showToast('Only leader can transfer session');
                return;
            }
            
            // Generate combined transfer token: sessionId-randomCode
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let randomCode = '';
            for (let i = 0; i < 6; i++) {
                randomCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // Combined token: SESSION-ID-RANDOMCODE (e.g., 1234-5678-ABC123)
            state.transferToken = `${state.sessionId}-${randomCode}`;
            state.transferPending = true;
            autoSave();
            
            showToast('Transfer initiated! Token generated.');
            renderSessionPanel();
        }

        function cancelTransfer() {
            state.transferToken = null;
            state.transferPending = false;
            autoSave();
            showToast('Transfer cancelled');
            renderSessionPanel();
        }

        async function acceptTransfer() {
            const combinedToken = document.getElementById('transferTokenInput')?.value.trim();
            
            console.log('Combined token input:', combinedToken);
            
            if (!combinedToken) {
                showToast('Enter transfer token');
                return;
            }
            
            // Parse combined token: sessionId-randomCode
            const parts = combinedToken.split('-');
            if (parts.length < 3) {
                showToast('Invalid transfer token format');
                return;
            }
            
            // Reconstruct sessionId (handles dashes in session ID)
            const randomCode = parts[parts.length - 1];
            const sessionId = parts.slice(0, -1).join('-');
            
            console.log('Parsed:', { sessionId, randomCode });
            
            state.sessionId = sessionId;
            
            // Try to load session and verify transfer token
            let data = null;
            try {
                const response = await fetch(`/api/session/${state.sessionId}`);
                if (response.ok) {
                    const result = await response.json();
                    data = result.data;
                }
            } catch (e) {
                console.warn('Could not load from server:', e);
            }
            
            if (!data) {
                const localData = localStorage.getItem(STORAGE_PREFIX + state.sessionId);
                if (localData) {
                    data = JSON.parse(localData);
                }
            }
            
            console.log('Loaded data:', data);
            console.log('Token match:', data?.transferToken === combinedToken);
            
            if (!data || !data.transferToken || data.transferToken !== combinedToken) {
                showToast('Invalid transfer token or session not pending transfer');
                return;
            }
            
            // Accept the transfer - become admin
            state.isReadOnly = false;
            state.transferToken = null;
            state.transferPending = false;
            document.getElementById('sessionId').value = state.sessionId;
            document.getElementById('joinId').value = '';
            document.getElementById('transferTokenInput').value = '';
            
            // Persist as leader
            localStorage.setItem('LAST_SESSION_ID', state.sessionId);
            localStorage.setItem('IS_READ_ONLY', 'false');
            
            // Load the full session
            await loadSession();
            
            showToast('Leadership transferred! You are now the rally leader.');
        }

        function copyTransferToken() {
            if (!state.transferToken) return;
            navigator.clipboard.writeText(state.transferToken).then(() => {
                showToast('Transfer token copied!');
            });
        }

        function copySessionId() {
            const sessionId = document.getElementById('sessionId').value;
            if (!sessionId) {
                showToast('Generate session first');
                return;
            }
            navigator.clipboard.writeText(sessionId).then(() => {
                showToast('✓ Session ID copied!');
            }).catch(() => {
                showToast('Failed to copy');
            });
        }

        function pasteSessionId() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('joinId').value = text.trim();
                showToast('✓ Pasted!');
            }).catch(() => {
                showToast('Failed to paste - try manual paste');
            });
        }

        async function joinSession() {
            const id = document.getElementById('joinId').value.trim();
            if (!id) {
                showToast('Enter session ID');
                return;
            }
            state.sessionId = id;
            state.isReadOnly = true;
            document.getElementById('sessionId').value = id;
            document.getElementById('joinId').value = '';
            
            // Persist session ID so it survives page refresh
            localStorage.setItem('LAST_SESSION_ID', id);
            localStorage.setItem('IS_READ_ONLY', 'true');
            
            await loadSession();
        }

        async function autoSave() {
            if (state.sessionId && !state.isReadOnly) {
                // Save to server via API (for cross-device sync)
                // Also keep localStorage as backup
                localStorage.setItem(STORAGE_PREFIX + state.sessionId, JSON.stringify(state));
                
                try {
                    await fetch('/api/session/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sessionId: state.sessionId,
                            data: state
                        })
                    });
                } catch (e) {
                    console.warn('Could not save to server:', e);
                    // Still works with localStorage fallback
                }
            }
        }

        async function loadSession() {
            let data = null;
            
            // Try to load from server first (cross-device)
            try {
                const response = await fetch(`/api/session/${state.sessionId}`);
                if (response.ok) {
                    const result = await response.json();
                    data = result.data;
                    console.log('Loaded from server:', state.sessionId);
                }
            } catch (e) {
                console.warn('Could not load from server:', e);
            }
            
            // Fall back to localStorage if server not available
            if (!data) {
                const localData = localStorage.getItem(STORAGE_PREFIX + state.sessionId);
                if (localData) {
                    data = JSON.parse(localData);
                    console.log('Loaded from localStorage:', state.sessionId);
                }
            }
            
            console.log('Loading session:', state.sessionId);
            console.log('Data found:', !!data);
            console.log('Is read-only:', state.isReadOnly);
            
            if (data) {
                try {
                    state.groups = data.groups || [];
                    state.rallyTime = data.rallyTime || 5;
                    state.startDelay = data.startDelay || 1;
                    state.target = data.target || 'castle';
                    state.calculatedRallyStartTime = data.calculatedRallyStartTime || null;
                    state.transferToken = data.transferToken || null;
                    state.transferPending = data.transferPending || false;
                    
                    if (state.isReadOnly) {
                        // Read-only mode: Hide all editing controls and show only results
                        document.getElementById('configSection').style.display = 'none';
                        document.getElementById('groupsContainer').style.display = 'none';
                        const addGroupBtn = document.querySelector('button[onclick="addGroup()"]');
                        if (addGroupBtn) addGroupBtn.style.display = 'none';
                        const calculateBtn = document.querySelector('button[onclick="calculateRallies()"]');
                        if (calculateBtn) calculateBtn.style.display = 'none';
                        document.getElementById('sessionPanel').classList.remove('show');
                        
                        // Show comparison section for read-only users
                        document.getElementById('comparisonInput').style.display = 'block';
                        
                        // Always calculate to show results
                        // calculateRallies will use stored time if available, otherwise calculate fresh
                        calculateRallies();
                        
                        // Start real-time polling for updates
                        startSessionPolling();
                        
                        showToast(`Joined: ${state.sessionId} (View)`);
                    } else {
                        // Edit mode: Show everything
                        document.getElementById('configSection').style.display = 'block';
                        document.getElementById('groupsContainer').style.display = 'block';
                        const addGroupBtn = document.querySelector('button[onclick="addGroup()"]');
                        if (addGroupBtn) addGroupBtn.style.display = 'block';
                        document.getElementById('rallyTime').value = state.rallyTime;
                        document.getElementById('startDelay').value = state.startDelay;
                        renderGroups();
                        renderSessionPanel();
                        
                        // If there are groups, auto-calculate to show results
                        const hasGroups = state.groups && state.groups.some(g => g.members && g.members.length > 0);
                        if (hasGroups) {
                            calculateRallies();
                        }
                    }
                    updateUIState();
                } catch (e) {
                    console.error('Error parsing session data:', e);
                    showToast('Error loading session');
                }
            } else {
                if (state.isReadOnly) {
                    showToast('Session not found');
                    state.isReadOnly = false;
                    console.warn('Session data not found for:', state.sessionId);
                }
            }
        }

        let pollInterval = null;
        let lastPollData = null;

        function startSessionPolling() {
            // Show live indicator
            const liveIndicator = document.getElementById('liveIndicator');
            if (liveIndicator) {
                liveIndicator.style.display = 'inline';
            }
            
            console.log('Starting session polling for:', state.sessionId);
            
            // Poll for updates every 2 seconds if in read-only mode
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                if (!state.isReadOnly) {
                    clearInterval(pollInterval);
                    if (liveIndicator) liveIndicator.style.display = 'none';
                    return;
                }
                
                let loaded = null;
                
                // Try to load from server first (cross-device)
                try {
                    const response = await fetch(`/api/session/${state.sessionId}`);
                    if (response.ok) {
                        const result = await response.json();
                        loaded = result.data;
                        console.log('Polled from server:', state.sessionId);
                    } else {
                        console.warn('Server response not ok:', response.status);
                    }
                } catch (e) {
                    console.warn('Could not poll server:', e);
                }
                
                // Fall back to localStorage
                if (!loaded) {
                    const localData = localStorage.getItem(STORAGE_PREFIX + state.sessionId);
                    if (localData) {
                        try {
                            loaded = JSON.parse(localData);
                            console.log('Polled from localStorage:', state.sessionId);
                        } catch (e) {
                            console.warn('Could not parse localStorage:', e);
                        }
                    }
                }
                
                if (loaded) {
                    // Deep comparison - check if data actually changed
                    const currentDataStr = JSON.stringify({
                        groups: state.groups,
                        rallyTime: state.rallyTime,
                        startDelay: state.startDelay,
                        target: state.target,
                        calculatedRallyStartTime: state.calculatedRallyStartTime,
                        transferToken: state.transferToken,
                        transferPending: state.transferPending
                    });
                    const loadedDataStr = JSON.stringify({
                        groups: loaded.groups || [],
                        rallyTime: loaded.rallyTime || 5,
                        startDelay: loaded.startDelay || 1,
                        target: loaded.target || 'castle',
                        calculatedRallyStartTime: loaded.calculatedRallyStartTime || null,
                        transferToken: loaded.transferToken || null,
                        transferPending: loaded.transferPending || false
                    });
                    
                    const dataChanged = currentDataStr !== loadedDataStr;
                    
                    if (dataChanged) {
                        console.log('Data changed! Updating...');
                        
                        // Check if transfer is being accepted (transferToken cleared but we were pending)
                        const transferAccepted = state.transferPending && !loaded.transferPending && loaded.transferToken === null;
                        
                        // Update state with new data
                        state.groups = loaded.groups || [];
                        state.rallyTime = loaded.rallyTime || 5;
                        state.startDelay = loaded.startDelay || 1;
                        state.target = loaded.target || 'castle';
                        state.calculatedRallyStartTime = loaded.calculatedRallyStartTime || null;
                        state.transferToken = loaded.transferToken || null;
                        state.transferPending = loaded.transferPending || false;
                        
                        // Handle transfer completion
                        if (transferAccepted && !state.isReadOnly) {
                            // Old leader becomes read-only
                            state.isReadOnly = true;
                            localStorage.setItem('IS_READ_ONLY', 'true');
                            showToast('Leadership transferred! You are now a viewer.');
                            location.reload();
                        }
                        
                        // Re-render session panel to show transfer status
                        renderSessionPanel();
                        
                        // Recalculate and show updated results
                        calculateRallies();
                        
                        // Flash the live indicator to show update happened
                        if (liveIndicator) {
                            liveIndicator.style.opacity = '0.5';
                            setTimeout(() => {
                                liveIndicator.style.opacity = '1';
                            }, 200);
                        }
                    }
                }
            }, 2000); // Poll every 2 seconds
        }

        function stopSessionPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            const liveIndicator = document.getElementById('liveIndicator');
            if (liveIndicator) {
                liveIndicator.style.display = 'none';
            }
        }

        function updateUIState() {
            const readonly = state.isReadOnly;
            document.querySelectorAll('input, select').forEach(el => {
                if (el.id !== 'utcTime' && el.id !== 'sessionId' && el.id !== 'joinId' && el.id !== 'showComparisonToggle' && el.id !== 'comparisonSessionId') {
                    el.disabled = readonly;
                }
            });
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function pad(n) {
            return String(n).padStart(2, '0');
        }
    </script>
</body>
</html>
