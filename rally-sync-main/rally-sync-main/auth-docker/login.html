<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Sync - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .login-container {
            background: rgba(20, 20, 40, 0.95);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #999;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #ccc;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>⚔️ Rally Sync</h1>
            <p>Alliance Rally Coordinator</p>
        </div>
        
        <form id="loginForm">
            <div class="error-message" id="errorMsg"></div>
            
            <div class="form-group">
                <label for="playerId">Player ID</label>
                <input 
                    type="number" 
                    id="playerId" 
                    placeholder="Enter your in-game ID"
                    autocomplete="off"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="serverNumber">Server Number</label>
                <input 
                    type="number" 
                    id="serverNumber" 
                    placeholder="Enter your server number"
                    autocomplete="off"
                    required
                >
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            
            <div class="loading" id="loading">
                <span class="spinner"></span>Verifying...
            </div>
        </form>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const playerId = document.getElementById('playerId');
        const serverNumber = document.getElementById('serverNumber');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = playerId.value.trim();
            const server = serverNumber.value.trim();
            
            if (!id) {
                showError('Please enter your Player ID');
                return;
            }
            
            if (!server) {
                showError('Please enter your Server Number');
                return;
            }
            
            loginBtn.disabled = true;
            loading.classList.add('show');
            errorMsg.classList.remove('show');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        player_id: parseInt(id),
                        server_number: parseInt(server)
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store auth info
                    localStorage.setItem('rally_player_id', data.player_id);
                    localStorage.setItem('rally_player_name', data.player_name);
                    localStorage.setItem('rally_tc_level', data.tc_level);
                    localStorage.setItem('rally_server', data.server);
                    
                    // Redirect to app
                    window.location.href = '/rally-sync.html';
                } else {
                    const errorMap = {
                        'IP_BLOCKED': 'Your IP has been blocked. Contact admin.',
                        'RATE_LIMITED': 'Too many attempts. Please wait 15 minutes.',
                        'INVALID_PLAYER_ID': 'Invalid Player ID. Please check and try again.',
                        'MISSING_PLAYER_ID': 'Player ID is required.',
                        'MISSING_SERVER_NUMBER': 'Server Number is required.',
                        'SERVER_MISMATCH': 'Player ID does not match this server. Please verify both fields.',
                        'INVALID_SERVER_FORMAT': 'Invalid server number format.'
                    };
                    showError(errorMap[data.error] || 'Login failed. Please try again.');
                }
            } catch (err) {
                showError('Connection error. Please try again.');
                console.error(err);
            } finally {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
        });
        
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
    </script>
</body>
</html>
